services:
  portfolio:
    build: .
    restart: unless-stopped
    networks:
      - padelclubstats_app_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=padelclubstats_app_network"
      - "traefik.http.routers.portfolio.rule=Host(`mathiscordon.fr`) || Host(`www.mathiscordon.fr`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"

networks:
  padelclubstats_app_network:
    external: true
